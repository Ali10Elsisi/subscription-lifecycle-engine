services:
  subscription_app:
    container_name: subscription_app
    build:
      context: .
      dockerfile: .docker/apache/Dockerfile
    volumes:
      - .:/var/www/html
      - ./.docker/vhost.conf:/etc/apache2/sites-enabled/apache.conf
    ports:
      - "8030:80"
    environment:
      - VIRTUAL_HOST=subscriptiontest.local
    depends_on:
      - subscription_mysql

  subscription_mysql:
    container_name: subscription_mysql
    build:
      context: .
      dockerfile: .docker/mysql/Dockerfile
    ports:
      - "3340:3306"
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: subscriptiontest

  subscription_phpmyadmin:
    container_name: subscription_phpmyadmin
    build:
      context: .
      dockerfile: .docker/phpmyadmin/Dockerfile
    links:
      - subscription_mysql:mysql
    ports:
      - "8025:80"
    environment:
      MYSQL_HOST: subscription_mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      PMA_HOST: subscription_mysql

